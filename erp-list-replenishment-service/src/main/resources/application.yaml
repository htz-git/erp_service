server:
  port: 8088
spring:
  application:
    name: erp-list-replenishment-service
  datasource:
    url: jdbc:mysql://39.105.104.224:3306/erp_list_replenishment?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  cloud:
    nacos:
      server-addr: 39.105.104.224:8848
mybatis-plus:
  global-config:
    db-config:
      update-strategy: not_null
      id-type: auto
logging:
  level:
    com.erplist: debug
  file:
    path: "logs/${spring.application.name}"
knife4j:
  enable: true
  openapi:
    title: ERP用户服务接口文档
    description: "ERP用户服务接口文档"
    version: v1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.erplist.replenishment.controller

# 开题报告口径参数：LSTM 预测与补货建议（可按论文调优）
replenishment:
  lstm:
    time-steps: 30
    hidden-units: 64
    learning-rate: 0.001
    epochs: 50
    early-stop-patience: 5
    early-stop-min-delta: 1.0e-4
    min-history-len: 5
    max-forecast-days: 30
  suggestion:
    history-days: 30
    forecast-days: 7
    forecast-buffer-ratio: 1.1
    lead-time-days: 3
    use-min-stock-as-safety-stock: true

