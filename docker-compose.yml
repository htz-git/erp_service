    environment:
      SPRING_CLOUD_NACOS_SERVER_ADDR: ${NACOS_SERVER:-39.105.104.224:8848}
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - seller-service
    restart: unless-stopped

  frontend:
    build:
      context: erp-list-frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - gateway
    restart: unless-stopped
