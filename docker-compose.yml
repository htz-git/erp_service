    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.java
      args:
        JAR_PATH: erp-list-gateway/target/erp-list-gateway.jar
    environment:
      SPRING_CLOUD_NACOS_SERVER_ADDR: ${NACOS_SERVER:-nacos-server:8848}
    ports:
      - "8080:8080"
    networks:
      - default
      - nacos-mysql-network
    depends_on:
      - user-service
      - seller-service
    restart: unless-stopped

  frontend:
    build:
      context: erp-list-frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - gateway
    restart: unless-stopped

networks:
  nacos-mysql-network:
    external: true
