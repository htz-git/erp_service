      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST:-39.105.104.224}:3306/erp_list_product?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-root}
    networks:
      - default
      - nacos-mysql-network
    restart: unless-stopped

  purchase-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.java
      args:
        JAR_PATH: erp-list-purchase-service/target/erp-list-purchase-service.jar
    environment:
      SPRING_CLOUD_NACOS_SERVER_ADDR: ${NACOS_SERVER:-nacos-server:8848}
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST:-39.105.104.224}:3306/erp_list_purchase?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-root}
    networks:
      - default
      - nacos-mysql-network
    restart: unless-stopped

  refund-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.java
      args:
        JAR_PATH: erp-list-refund-service/target/erp-list-refund-service.jar
    environment:
      SPRING_CLOUD_NACOS_SERVER_ADDR: ${NACOS_SERVER:-nacos-server:8848}
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST:-39.105.104.224}:3306/erp_list_refund?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-root}
    networks:
      - default
