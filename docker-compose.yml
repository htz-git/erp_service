      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST:-39.105.104.224}:3306/erp_list_order?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-root}
    networks:
      - default
      - nacos-mysql-network
    restart: unless-stopped

  product-service:
