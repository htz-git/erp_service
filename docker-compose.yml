# 依赖已部署的 Nacos、MySQL（地址由 .env 提供，默认与项目 application.yaml 一致）
# 使用前：1) mvn clean package -DskipTests  2) erp-list-frontend 下 npm run build
#         3) cp .env.example .env  4) docker compose up -d

services:
  user-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.java
      args:
        JAR_PATH: erp-list-user-service/target/erp-list-user-service.jar
    environment:
      SPRING_CLOUD_NACOS_SERVER_ADDR: ${NACOS_SERVER:-39.105.104.224:8848}
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST:-39.105.104.224}:3306/erp_list_user?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-root}
    restart: unless-stopped

  seller-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.java
      args:
        JAR_PATH: erp-list-seller-service/target/erp-list-seller-service.jar
